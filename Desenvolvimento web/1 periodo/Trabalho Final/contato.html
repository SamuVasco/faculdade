<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contato</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>Samuel Souza | Desenvolvedor em formação</h1>
        <nav>
            <a href="index.html" target="_self">Home</a></li>
            <a href="sobre.html" target="_self">Sobre mim</a></li>
            <a href="contato.html" target="_self">Contato</a></li>
        </nav>
    </header>

    <main>
        <section id="cheader">
            <h1>Entre em contato</h1>
            <p>Preencha o formulário para me enviar uma mensagem.</p>
        </section>
        
        <section id="cform">
            <form action="bd.py" method="POST">
        
                <label for="nome">Nome</label>
                <input type="text" id="nome" name="nome" placeholder="Seu nome completo">

                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="exemplo@gmail.com">
                
                <label for="assunto">Assunto</label>
                <input type="text" id="assunto" name="assunto" placeholder="Geral, Projeto, Oportunidade">
                
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" placeholder="Escreva a mensagem aqui..." maxlength="440"></textarea>

                <button type="submit">Enviar</button>
            </form>
        </section>

        </section>


        <footer>&copy; 2026 - Samuel Souza - Desenvolvimento Web I - (Curso de SI)</footer>
    </main>
</body>
</html>
